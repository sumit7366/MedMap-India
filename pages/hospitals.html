<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hospitals — MedMap India</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/style.css" />
  <style>
    .hospital-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 18px; }
    .hosp-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 24px; cursor: pointer;
      transition: all 0.2s;
    }
    .hosp-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
    .hosp-head { display: flex; gap: 14px; margin-bottom: 14px; }
    .hosp-icon { font-size: 2rem; }
    .hosp-title { font-family: var(--font-head); font-weight: 700; font-size: 1rem; margin-bottom: 4px; line-height: 1.3; }
    .hosp-loc { font-size: 0.8rem; color: var(--text2); }
    .hosp-meta { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 12px; }
    .hosp-stat { background: var(--card2); border-radius: 8px; padding: 8px 12px; text-align: center; }
    .hosp-stat-val { font-family: var(--font-head); font-size: 1.2rem; font-weight: 800; color: var(--accent); }
    .hosp-stat-label { font-size: 0.7rem; color: var(--text2); }
    .hosp-specialties { display: flex; flex-wrap: wrap; gap: 5px; }
    .hosp-spec { font-size: 0.72rem; background: rgba(0,212,255,0.08); color: var(--accent); padding: 2px 8px; border-radius: 6px; font-weight: 600; }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="nav-inner">
      <a class="nav-logo" href="../index.html">
        <span class="logo-icon">⚕</span>
        <span class="logo-text">MedMap<span class="logo-india">India</span></span>
      </a>
      <ul class="nav-links">
        <li><a href="../index.html">Dashboard</a></li>
        <li><a href="hospitals.html" class="active">Hospitals</a></li>
        <li><a href="doctors.html">Doctors</a></li>
        <li><a href="map.html">Map View</a></li>
        <li><a href="agent.html">AI Agent</a></li>
        <li><a href="deserts.html">Medical Deserts</a></li>
      </ul>
      <div class="nav-badge">IDP Agent v1.0</div>
    </div>
  </nav>

  <div class="page-inner">
    <h1 class="page-title">🏥 Healthcare Facilities</h1>
    <p class="page-subtitle">All mapped hospitals, clinics and health centres across India — <span id="totalCount"></span> facilities</p>

    <div class="filter-bar">
      <input type="text" id="filterSearch" placeholder="Search by name, city, state..." class="filter-input" style="width:260px" oninput="applyFilters()" />
      <select id="filterType" class="filter-input" onchange="applyFilters()">
        <option value="">All Types</option>
        <option value="hospital">Hospital</option>
        <option value="clinic">Clinic</option>
      </select>
      <select id="filterOperator" class="filter-input" onchange="applyFilters()">
        <option value="">All Operators</option>
        <option value="public">Public</option>
        <option value="private">Private</option>
      </select>
      <select id="filterState" class="filter-input" onchange="applyFilters()">
        <option value="">All States</option>
      </select>
      <select id="filterDesert" class="filter-input" onchange="applyFilters()">
        <option value="">All Coverage</option>
        <option value="good">Well-served (≤3)</option>
        <option value="medium">Moderate (4-6)</option>
        <option value="bad">Underserved (7+)</option>
      </select>
    </div>

    <div class="hospital-grid" id="hospitalGrid"></div>
  </div>

  <!-- Modal overlay will be created by JS -->

  <script src="../js/data.js"></script>
  <script>
    let filtered = [...HOSPITALS];

    function populateStates() {
      const sel = document.getElementById("filterState");
      const states = [...new Set(HOSPITALS.map(h => h.state))].sort();
      states.forEach(s => {
        const opt = document.createElement("option");
        opt.value = s; opt.textContent = s;
        sel.appendChild(opt);
      });
    }

    function applyFilters() {
      const q = document.getElementById("filterSearch").value.toLowerCase();
      const type = document.getElementById("filterType").value;
      const op = document.getElementById("filterOperator").value;
      const state = document.getElementById("filterState").value;
      const desert = document.getElementById("filterDesert").value;

      filtered = HOSPITALS.filter(h => {
        if (q && !h.name.toLowerCase().includes(q) && !h.city.toLowerCase().includes(q) && !h.state.toLowerCase().includes(q)) return false;
        if (type && h.type !== type) return false;
        if (op && h.operator !== op) return false;
        if (state && h.state !== state) return false;
        if (desert === "good" && h.medicalDesertScore > 3) return false;
        if (desert === "medium" && (h.medicalDesertScore < 4 || h.medicalDesertScore > 6)) return false;
        if (desert === "bad" && h.medicalDesertScore < 7) return false;
        return true;
      });
      renderGrid();
    }

    function renderGrid() {
      const grid = document.getElementById("hospitalGrid");
      document.getElementById("totalCount").textContent = filtered.length;
      if (!filtered.length) {
        grid.innerHTML = `<div style="color:var(--text2);padding:40px">No results found.</div>`;
        return;
      }
      grid.innerHTML = filtered.map(h => `
        <div class="hosp-card" onclick="openModal('${h.id}')">
          <div class="hosp-head">
            <span class="hosp-icon">${typeIcon(h.type)}</span>
            <div>
              <div class="hosp-title">${h.name}</div>
              <div class="hosp-loc">📍 ${h.city}, ${h.state}</div>
            </div>
          </div>
          <div class="hosp-meta">
            <div class="hosp-stat"><div class="hosp-stat-val">${h.capacity}</div><div class="hosp-stat-label">Beds</div></div>
            <div class="hosp-stat"><div class="hosp-stat-val">${h.numberDoctors}</div><div class="hosp-stat-label">Doctors</div></div>
            <div class="hosp-stat"><div class="hosp-stat-val">${h.yearEstablished}</div><div class="hosp-stat-label">Est.</div></div>
            <div class="hosp-stat"><div class="hosp-stat-val ${h.medicalDesertScore >= 7 ? 'text-red' : h.medicalDesertScore >= 4 ? 'text-yellow' : 'text-green'}">${h.medicalDesertScore}/10</div><div class="hosp-stat-label">Desert</div></div>
          </div>
          <div class="hosp-specialties">
            ${h.specialties.slice(0,4).map(s => `<span class="hosp-spec">${specialtyLabel(s)}</span>`).join("")}
            ${h.specialties.length > 4 ? `<span class="hosp-spec">+${h.specialties.length-4} more</span>` : ""}
          </div>
          <div style="margin-top:12px;display:flex;gap:8px;align-items:center">
            <span class="score-badge ${getScoreClass(h.medicalDesertScore)}">${getDesertLabel(h.medicalDesertScore)}</span>
            <span style="font-size:0.78rem;color:var(--text3)">${h.operator} · ${h.address_country}</span>
            ${h.acceptsVolunteers ? '<span style="font-size:0.78rem;color:var(--green)">✓ Volunteers</span>' : ''}
          </div>
        </div>
      `).join("");
    }

    let modalEl = null;
    function openModal(id) {
      const h = HOSPITALS.find(x => x.id === id);
      if (!h) return;
      if (!modalEl) {
        modalEl = document.createElement("div");
        modalEl.className = "modal-overlay";
        modalEl.innerHTML = `<div class="modal" id="modalInner"></div>`;
        modalEl.addEventListener("click", (e) => { if (e.target === modalEl) closeModal(); });
        document.body.appendChild(modalEl);
      }
      document.getElementById("modalInner").innerHTML = `
        <button class="modal-close" onclick="closeModal()">✕</button>
        <h2>${h.name}</h2>
        <div class="modal-location">📍 ${h.address_city}, ${h.state} &nbsp;|&nbsp; ${typeIcon(h.type)} ${h.type} &nbsp;|&nbsp; <span class="score-badge ${getScoreClass(h.medicalDesertScore)}">${getDesertLabel(h.medicalDesertScore)}</span></div>
        <div class="modal-section"><div class="modal-section-title">Overview</div><p style="color:var(--text2);font-size:0.88rem">${h.description}</p></div>
        <div class="modal-info-grid">
          <div class="modal-info-item"><div class="modal-info-label">Capacity</div><div class="modal-info-value text-accent">${h.capacity} beds</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Doctors</div><div class="modal-info-value text-green">${h.numberDoctors}</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Operator</div><div class="modal-info-value">${h.operator}</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Established</div><div class="modal-info-value">${h.yearEstablished}</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Desert Score</div><div class="modal-info-value text-red">${h.medicalDesertScore}/10</div></div>
          <div class="modal-info-item"><div class="modal-info-label">Volunteers</div><div class="modal-info-value">${h.acceptsVolunteers ? "✅ Yes" : "❌ No"}</div></div>
        </div>
        <div class="modal-section"><div class="modal-section-title">Specialties</div><div class="modal-tags">${h.specialties.map(s => `<span class="modal-tag">${specialtyLabel(s)}</span>`).join("")}</div></div>
        <div class="modal-section"><div class="modal-section-title">Equipment</div><div class="modal-tags">${h.equipment.map(e => `<span class="modal-tag">${e}</span>`).join("")}</div></div>
        <div class="modal-section"><div class="modal-section-title">Procedures</div><div class="modal-tags">${h.procedures.map(p => `<span class="modal-tag">${p}</span>`).join("")}</div></div>
        <div class="modal-section"><div class="modal-section-title">Capabilities</div><div class="modal-tags">${h.capabilities.map(c => `<span class="modal-tag">${c}</span>`).join("")}</div></div>
        ${h.phone ? `<div class="modal-section"><div class="modal-section-title">Contact</div><div style="font-size:0.88rem;color:var(--text2)">${h.phone}${h.email ? " &nbsp;|&nbsp; " + h.email : ""}${h.website ? ' &nbsp;|&nbsp; <a href="https://'+h.website+'" target="_blank">'+h.website+'</a>' : ""}</div></div>` : ""}
      `;
      modalEl.classList.add("open");
      document.body.style.overflow = "hidden";
    }

    function closeModal() {
      if (modalEl) { modalEl.classList.remove("open"); document.body.style.overflow = ""; }
    }
    document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });

    // Check URL params
    const urlQ = new URLSearchParams(location.search).get("q");
    if (urlQ) document.getElementById("filterSearch").value = urlQ;

    populateStates();
    applyFilters();
  </script>
</body>
</html>
